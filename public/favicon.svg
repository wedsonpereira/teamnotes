<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Notepad body -->
  <rect x="6" y="8" width="20" height="22" rx="2" fill="#6366f1"/>
  <!-- Spiral binding -->
  <g stroke="#fff" stroke-width="1.5" stroke-linecap="round">
    <line x1="10" y1="6" x2="10" y2="10"/>
    <line x1="14" y1="6" x2="14" y2="10"/>
    <line x1="18" y1="6" x2="18" y2="10"/>
    <line x1="22" y1="6" x2="22" y2="10"/>
  </g>
  <!-- Person 1 head -->
  <circle cx="13" cy="17" r="3" fill="#fff"/>
  <!-- Person 2 head -->
  <circle cx="19" cy="16.5" r="3" fill="#fff"/>
  <!-- Person bodies -->
  <ellipse cx="13" cy="25" rx="5" ry="4" fill="#fff"/>
  <ellipse cx="19" cy="25" rx="5" ry="4" fill="#fff"/>
</svg>
