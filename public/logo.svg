<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Dotted circle -->
  <circle cx="100" cy="120" r="88" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="5 7" stroke-linecap="round" opacity="0.7"/>
  <!-- Notepad body -->
  <rect x="60" y="68" width="80" height="100" rx="4" fill="currentColor" opacity="0.08" stroke="currentColor" stroke-width="2.5"/>
  <!-- Spiral binding -->
  <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="72" y1="64" x2="72" y2="72"/>
    <line x1="80" y1="64" x2="80" y2="72"/>
    <line x1="88" y1="64" x2="88" y2="72"/>
    <line x1="96" y1="64" x2="96" y2="72"/>
    <line x1="104" y1="64" x2="104" y2="72"/>
    <line x1="112" y1="64" x2="112" y2="72"/>
    <line x1="120" y1="64" x2="120" y2="72"/>
    <line x1="128" y1="64" x2="128" y2="72"/>
  </g>
  <!-- Person 1 (left) - head -->
  <circle cx="90" cy="100" r="14" fill="currentColor"/>
  <!-- Person 2 (right) - head -->
  <circle cx="112" cy="98" r="14" fill="currentColor"/>
  <!-- Person bodies (shoulders) -->
  <ellipse cx="90" cy="140" rx="24" ry="18" fill="currentColor"/>
  <ellipse cx="112" cy="140" rx="24" ry="18" fill="currentColor"/>
  <!-- Dividing line between bodies for visual clarity -->
  <line x1="101" y1="124" x2="101" y2="155" stroke="var(--landing-bg, #ffffff)" stroke-width="2" opacity="0.5"/>
</svg>
